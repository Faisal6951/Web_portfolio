<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Matte Black Background -->
  <rect width="32" height="32" rx="4" fill="#0A0A0A" />

  <!-- Sharp Tactical Crosshair Ring -->
  <circle cx="16" cy="16" r="8" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.9" />
  
  <!-- Crosshair Ticks -->
  <line x1="16" y1="4" x2="16" y2="6" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="16" y1="26" x2="16" y2="28" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="4" y1="16" x2="6" y2="16" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="26" y1="16" x2="28" y2="16" stroke="#FFFFFF" stroke-width="1.5" />

  <!-- Lethal Crimson Center Dot -->
  <circle cx="16" cy="16" r="2.5" fill="#FF0000" />
</svg>
